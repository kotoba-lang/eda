name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # kotoba-ui / appkit (+ their shitsuke / liquid-glass-ui :local/root
      # pins) are west siblings — check them out next to eda/.
      - uses: actions/checkout@v4
        with:
          path: eda
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/kotoba-ui
          path: kotoba-ui
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/appkit
          path: appkit
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/shitsuke
          path: shitsuke
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/liquid-glass-ui
          path: liquid-glass-ui
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
      - run: clojure -M:test
        working-directory: eda
      - run: clojure -M:site
        working-directory: eda
      - run: clojure -M:oss-normalize docs/oss_manifest.edn
        working-directory: eda
  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
