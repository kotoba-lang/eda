name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      # deps.edn pins kotoba-ui / appkit as :local/root "../<repo>" west
      # siblings (and kotoba-ui itself pins shitsuke / liquid-glass-ui the
      # same way), so check this repo out into eda/ and the design-system
      # repos out next to it.
      - uses: actions/checkout@v4
        with:
          path: eda
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/kotoba-ui
          path: kotoba-ui
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/appkit
          path: appkit
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/shitsuke
          path: shitsuke
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/liquid-glass-ui
          path: liquid-glass-ui

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('eda/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        run: clojure -M:test
        working-directory: eda

      - name: Lint
        run: clojure -M:lint
        working-directory: eda
